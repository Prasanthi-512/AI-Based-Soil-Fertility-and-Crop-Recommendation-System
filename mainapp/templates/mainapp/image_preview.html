<!DOCTYPE html>
<html>
<head>
    <title>Image Dataset Preview</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 700% 700%;
            animation: bgAnimate 12s ease-in-out infinite alternate;
            color: #3e2723;
            padding-top: 100px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* Title Animation */
        .page-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            color: white;
            animation: slideDown 1.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Card style */
        .data-card {
            background: rgba(255, 255, 255, 0.88);
            border-radius: 18px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-custom {
            background: #6d4c41;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background: #3e2723;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" style="font-size: 26px;">📸 Image Dataset</a>

        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload CSV</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocess</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train ML</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train CNN</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- TITLE -->
<h1 class="page-title">Image Dataset Analysis</h1>

<!-- CONTENT CARD -->
<div class="container">
    <div class="data-card">

        <h4 class="mb-3"><strong>Class Distribution:</strong></h4>

        <table class="table table-bordered table-striped w-75">
            <tr class="table-dark">
                <th>Soil Class</th>
                <th>Image Count</th>
            </tr>

            {% for class, count in class_counts.items %}
            <tr>
                <td>{{ class }}</td>
                <td>{{ count }}</td>
            </tr>
            {% endfor %}
        </table>

        <h4 class="mt-5"><strong>Dataset Graph:</strong></h4>
        <img src="{{ graph }}" class="img-fluid rounded shadow mt-3" alt="Dataset Graph" style="border:4px solid #6d4c41;">

        <a href="/admin_upload_images/" class="btn btn-custom mt-4 px-4">Upload Another ZIP</a>
    </div>
</div>

</body>
</html>

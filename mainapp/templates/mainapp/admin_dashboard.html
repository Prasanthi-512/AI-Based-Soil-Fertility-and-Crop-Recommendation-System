<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 700% 700%;
            animation: bgAnimate 12s ease-in-out infinite alternate;
            color: #3e2723;
            padding-top: 90px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }
        /* DASHBOARD TITLE */
        .dashboard-title {
            font-size: 38px;
            font-weight: 700;
            text-align: center;
            color: white;
            animation: slideDown 1.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARDS */
        .option-card {
            background: rgba(255,255,255,0.85);
            border-radius: 18px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
            cursor: pointer;
            animation: fadeIn 1.5s ease-in-out;
        }

        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 14px 30px rgba(0,0,0,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .option-card i {
            font-size: 40px;
            color: #5d4037;
            margin-bottom: 15px;
        }

        .logout-btn {
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 18px;
            background: #d84315;
            color: white;
            border: none;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #bf360c;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" style="font-size: 26px;">🌱 Admin Panel</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocessing</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train Reports</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train Images</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- TITLE -->
<h1 class="dashboard-title" style="margin-top: 200px;">Admin Dashboard</h1>
<p class="text-center text-white">Welcome, {{ request.user.username }} 👋</p>



<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</body>
</html>

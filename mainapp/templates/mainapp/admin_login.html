<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Soil AI System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #2e7d32, #4caf50, #8bc34a);
            background-size: 400% 400%;
            animation: bgAnimation 10s infinite alternate;
            color: white;
        }

        /* Background Animation */
        @keyframes bgAnimation {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* Navbar */
        .navbar-custom {
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }

        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffeb3b !important;
            transform: scale(1.1);
        }

        /* Login Card */
        .login-card {
            width: 420px;
            border-radius: 20px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease-in-out;
            color: white;
            margin-top: 120px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-login {
            border-radius: 30px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-4px);
            box-shadow: 0px 8px 18px rgba(0,0,0,0.25);
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/" style="font-size: 26px;">
            🌱 Soil AI System
        </a>
        <div>
            <a href="/admin_login/" class="nav-link d-inline-block mx-2">Admin</a>
            <a href="/login/" class="nav-link d-inline-block mx-2">User</a>
            <a href="/register/" class="nav-link d-inline-block mx-2">Register</a>
        </div>
    </div>
</nav>

<!-- ADMIN LOGIN CARD -->
<div class="d-flex justify-content-center align-items-center">
    <div class="login-card">

        <h3 class="login-title text-center mb-4">🔑 Admin Login</h3>

        <form method="POST">
            {% csrf_token %}

            <label class="mb-1">Username</label>
            <input type="text" name="username" class="form-control mb-3" required>

            <label class="mb-1">Password</label>
            <input type="password" name="password" class="form-control mb-3" required>

            <button class="btn btn-danger btn-login">Login</button>
        </form>

        {% for message in messages %}
            <div class="alert alert-warning mt-3">{{ message }}</div>
        {% endfor %}

    </div>
</div>

</body>
</html>

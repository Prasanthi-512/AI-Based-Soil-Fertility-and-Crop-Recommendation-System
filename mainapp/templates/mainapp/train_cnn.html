<!DOCTYPE html>
<html>
<head>
    <title>Train CNN Image Model</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 700% 700%;
            animation: bgAnimate 12s ease-in-out infinite alternate;
            color: #3e2723;
            padding-top: 120px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.08);
        }

        /* PAGE TITLE */
        .page-title {
            font-size: 34px;
            font-weight: 700;
            text-align: center;
            color: white;
            animation: slideDown 1.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARD */
        .custom-card {
            background: rgba(255, 255, 255, 0.88);
            border-radius: 18px;
            padding: 35px;
            width: 500px;
            margin: auto;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-train {
            background: #6d4c41;
            color: white;
            border-radius: 30px;
            padding: 12px 20px;
            font-size: 18px;
            transition: 0.3s;
        }
        .btn-train:hover {
            background: #4e342e;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" style="font-size: 24px;">🌱 Admin Panel</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocessing</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train ML</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train CNN</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- TITLE -->
<h1 class="page-title">Train CNN Image Model</h1>

<!-- FORM CARD -->
<div class="custom-card">
    <form method="POST">
        {% csrf_token %}
        <p style="font-size: 17px; margin-bottom: 20px;">
            This will train a deep learning CNN model using the preprocessed image dataset (80/20 split).
        </p>

        <button class="btn btn-train w-100">Start CNN Training</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV Dataset</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 700% 700%;
            animation: bgAnimate 10s infinite alternate;
            color: #3e2723;
            padding-top: 100px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* CARD */
        .upload-card {
            background: rgba(255,255,255,0.85);
            border-radius: 18px;
            padding: 30px;
            max-width: 550px;
            margin: auto;
            margin-top: 60px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            animation: fadeInUp 1.2s ease-in-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-upload {
            background: #6d4c41;
            color: white;
            font-weight: 600;
            border-radius: 30px;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-upload:hover {
            background: #4e342e;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" style="font-size: 24px;">🌾 Upload CSV Dataset</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocessing</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train ML</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train CNN</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- CONTENT CARD -->
<div class="upload-card">

    <h2 class="text-center mb-4 fw-bold" style="color:#4e342e;">Upload CSV Dataset</h2>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label class="fw-semibold">Select CSV File:</label>
        <input type="file" name="csv_file" class="form-control mb-3" required>

        <button class="btn btn-upload w-100">Upload Dataset</button>
    </form>

</div>

</body>
</html>

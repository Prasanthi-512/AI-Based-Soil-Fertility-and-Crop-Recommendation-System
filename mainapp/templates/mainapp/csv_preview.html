<!DOCTYPE html>
<html>
<head>
    <title>CSV Preview</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #6d4c41, #a1887f, #d7ccc8);
            background-size: 600% 600%;
            animation: bgAnimate 12s infinite alternate;
            color: #3e2723;
            padding-top: 90px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* PAGE TITLE */
        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 25px;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TABLE CONTAINER */
        .preview-box {
            background: rgba(255,255,255,0.85);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            animation: fadeIn 1.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95);}
            to { opacity: 1; transform: scale(1);}
        }

        .btn-custom {
            background: #6d4c41;
            color: white;
            border-radius: 30px;
            padding: 10px 25px;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background: #5d4037;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="#" style="font-size: 24px;">🌱 Admin Panel</a>

        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload CSV</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocess</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train ML</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train CNN</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="page-title">📄 Preview of: {{ file_name }}</h2>

    <div class="preview-box mt-4">
        {{ preview|safe }}
    </div>

    <div class="text-center mt-4">
        <a href="/admin_upload_csv/" class="btn btn-custom">Upload Another CSV</a>
    </div>

</div>

</body>
</html>

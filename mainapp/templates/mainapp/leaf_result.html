<!DOCTYPE html>
<html>
<head>
    <title>Leaf Disease Prediction Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #2e7d32, #8bc34a, #795548);
            background-size: 400% 400%;
            animation: bgMove 12s ease-in-out infinite alternate;
            color: white;
        }

        @keyframes bgMove {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffeb3b !important;
            transform: scale(1.05);
        }

        /* RESULT CARD */
        .result-card {
            margin-top: 120px;
            animation: fadeUp 1.3s ease-in-out;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .leaf-img {
            width: 320px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            animation: zoomIn 1.2s ease-in;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-custom {
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 16px;
            background: #2e7d32;
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #1b5e20;
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" style="font-size: 26px;">🌱 Soil & Leaf AI</a>

        <div>
            <a class="nav-link d-inline mx-2" href="/dashboard/">Dashboard</a>
            <a class="nav-link d-inline mx-2" href="/leaf_predict/">Leaf Predict</a>
            <a class="nav-link d-inline mx-2" href="/soil_image/">Soil Image</a>
            <a class="nav-link d-inline mx-2" href="/logout/">Logout</a>
        </div>
    </div>
</nav>

<!-- RESULT CONTENT -->
<div class="container d-flex justify-content-center">

    <div class="result-card p-5 shadow-lg text-center" style="width: 520px;">

        <h2 class="fw-bold mb-3">🌿 Leaf Disease Prediction</h2>
        <p class="mb-4">AI-based plant leaf disease analysis result</p>

        <!-- IMAGE -->
        <img src="{{ image_url }}" class="leaf-img" alt="Leaf Image">

        <!-- RESULT -->
        <h4 class="mt-3">Predicted Disease</h4>
        <p class="fs-5 fw-bold text-warning">{{ disease }}</p>

        <h4>Confidence Score</h4>
        <p class="fs-6">{{ confidence|floatformat:2 }}</p>

        <div class="mt-4">
            <a href="/leaf_predict/" class="btn btn-custom me-2">🔁 Predict Another</a>
            <a href="/dashboard/" class="btn btn-light ms-2">⬅ Dashboard</a>
        </div>

    </div>
</div>

</body>
</html>

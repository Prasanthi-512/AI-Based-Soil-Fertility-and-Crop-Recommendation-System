<!DOCTYPE html>
<html>
<head>
    <title>Preprocessing Completed</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 600% 600%;
            animation: bgAnimate 10s infinite alternate;
            color: #3e2723;
            padding-top: 80px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            color: white !important;
            transition: 0.3s;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* CARD */
        .result-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            padding: 30px;
            margin: auto;
            width: 60%;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-custom {
            background: #6d4c41;
            color: white;
            border-radius: 25px;
            padding: 10px 25px;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background: #4e342e;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white">🌱 Admin Panel</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocess</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train Reports</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train Images</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>


<!-- CONTENT CARD -->
<div class="result-card mt-5">
    <h2 class="text-center fw-bold mb-4">✔ Preprocessing Completed Successfully</h2>
    <hr>

    <h4>📄 CSV Dataset</h4>
    <div class="alert alert-info">{{ msg_csv }}</div>

    <h4>🖼 Image Dataset</h4>
    <div class="alert alert-info">{{ msg_img }}</div>

    <div class="text-center mt-4">
        <a href="/admin_preprocess/" class="btn btn-custom">Run Again</a>
    </div>
</div>

</body>
</html>

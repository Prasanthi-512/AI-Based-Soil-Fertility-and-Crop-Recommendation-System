<!DOCTYPE html>
<html>
<head>
    <title>Train ML Model</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 600% 600%;
            animation: bgShift 12s infinite alternate;
            padding-top: 100px;
            color: #3e2723;
        }

        @keyframes bgShift {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            color: white !important;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* Card Styling */
        .train-card {
            background: rgba(255,255,255,0.9);
            padding: 35px;
            width: 55%;
            margin: auto;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .train-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 30px;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .train-btn {
            background: #6d4c41;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 18px;
            transition: 0.3s;
            width: 100%;
        }
        .train-btn:hover {
            background: #5d4037;
            transform: translateY(-4px);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white">🌱 Admin Panel</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocessing</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train Reports</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train Images</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- PAGE TITLE -->
<h1 class="train-title">Train Machine Learning Model</h1>

<!-- TRAINING CARD -->
<form method="POST" class="train-card">
    {% csrf_token %}
    <p class="mb-4" style="font-size: 18px;">
        This will train the soil fertility prediction model using the preprocessed CSV dataset (80% training & 20% testing split).
    </p>

    <button class="train-btn">🚀 Start Training</button>
</form>

</body>
</html>

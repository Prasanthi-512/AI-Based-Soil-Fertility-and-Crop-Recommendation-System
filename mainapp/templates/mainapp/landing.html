<!DOCTYPE html>
<html>
<head>
    <title>Soil Analysis System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #2e7d32, #4caf50, #8bc34a);
            background-size: 400% 400%;
            animation: bgAnimation 10s infinite alternate;
            color: white;
        }

        /* Background Gradient Animation */
        @keyframes bgAnimation {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* Navbar */
        .navbar-custom {
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }

        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffeb3b !important;
            transform: scale(1.1);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-top: 110px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .hero-title {
            font-size: 40px;
            font-weight: 700;
            animation: slideDown 1.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Hero Image */
        .hero-img {
            width: 350px;
            margin: 20px auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: zoomIn 1.2s ease-in;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Buttons */
        .btn-custom {
            width: 220px;
            padding: 12px;
            font-size: 18px;
            border-radius: 30px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn-custom:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#" style="font-size: 26px;">
            🌱 Soil AI System
        </a>
        <div>
            <a href="/admin_login/" class="nav-link d-inline-block mx-2">Admin</a>
            <a href="/login/" class="nav-link d-inline-block mx-2">User</a>
            <a href="/register/" class="nav-link d-inline-block mx-2">Register</a>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="hero container">
    <h1 class="hero-title">Smart Soil Fertility & Crop Recommendation</h1>

    <img src="/static/mainapp/soil_banner.jpg" alt="Soil Analysis" class="hero-img">

    <div class="mt-4">
        <a href="/admin_login/" class="btn btn-danger btn-custom mx-2">Admin Login</a>
        <a href="/login/" class="btn btn-primary btn-custom mx-2">User Login</a>
        <a href="/register/" class="btn btn-light btn-custom mx-2">User Register</a>
    </div>
</section>

</body>
</html>

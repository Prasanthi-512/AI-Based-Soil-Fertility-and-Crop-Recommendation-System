<!DOCTYPE html>
<html>
<head>
    <title>ML Model Training Completed</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 600% 600%;
            animation: bgFlow 12s ease-in-out infinite alternate;
            color: #3e2723;
            padding-top: 120px;
        }

        @keyframes bgFlow {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
        }

        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.08);
        }

        /* PAGE TITLE */
        .page-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            animation: slideDown 1.2s ease-out;
            color: white;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARD BOX */
        .result-card {
            background: rgba(255,255,255,0.85);
            border-radius: 18px;
            max-width: 650px;
            margin: auto;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-custom {
            border-radius: 30px;
            padding: 12px 22px;
            font-size: 18px;
            background: #795548;
            border: none;
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #5d4037;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="#" style="font-size: 26px;">🌱 Admin Panel</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocess</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train Reports</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train Images</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- PAGE TITLE -->
<h1 class="page-title">ML Model Training Completed Successfully</h1>

<!-- RESULT CARD -->
<div class="result-card mt-4">

    <div class="alert alert-info text-center" style="font-size:18px;">
        <strong>{{ msg }}</strong>
    </div>

    <h4 class="mt-3 fw-bold">Training Accuracy:</h4>
    <p style="font-size: 18px;">{{ train }}</p>

    <h4 class="mt-3 fw-bold">Testing Accuracy:</h4>
    <p style="font-size: 18px;">{{ test }}</p>

    <div class="text-center mt-4">
        <a href="/admin_train_ml/" class="btn-custom">Train Again</a>
    </div>
</div>

</body>
</html>

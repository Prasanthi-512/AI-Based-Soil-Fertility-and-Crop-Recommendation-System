<!DOCTYPE html>
<html>
<head>
    <title>CNN Training Completed</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 700% 700%;
            animation: bgAnim 12s ease-in-out infinite alternate;
            color: #3e2723;
            padding-top: 100px;
        }

        @keyframes bgAnim {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }

        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* Title Animation */
        .title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            color: white;
            animation: slideDown 1.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Result Card */
        .result-card {
            background: rgba(255,255,255,0.88);
            border-radius: 20px;
            padding: 30px;
            width: 60%;
            margin: auto;
            margin-top: 40px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            animation: fadeIn 1.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-icon {
            font-size: 55px;
            color: #4e342e;
        }

        .btn-custom {
            background: #6d4c41;
            color: white;
            border-radius: 30px;
            padding: 12px 22px;
            font-size: 18px;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background: #4e342e;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" style="font-size: 26px;">🌱 Admin Panel</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload Reports</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocess</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train ML</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train CNN</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>

<!-- PAGE TITLE -->
<h1 class="title">🧠 CNN Training Completed</h1>

<!-- RESULT CARD -->
<div class="result-card text-center">
    <i class="bi bi-check-circle-fill result-icon"></i>

    <h3 class="mt-3">{{ msg }}</h3>

    <hr>

    <h4><strong>Training Accuracy:</strong> {{ train }}</h4>
    <h4><strong>Validation Accuracy:</strong> {{ val }}</h4>

    <a href="/admin_train_cnn/" class="btn btn-custom mt-4">Train Again</a>
</div>

</body>
</html>

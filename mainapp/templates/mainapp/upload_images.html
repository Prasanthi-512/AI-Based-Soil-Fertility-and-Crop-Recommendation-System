<!DOCTYPE html>
<html>
<head>
    <title>Upload Image Dataset</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #5d4037, #8d6e63, #d7ccc8);
            background-size: 700% 700%;
            animation: bgAnimate 12s ease-in-out infinite alternate;
            color: #3e2723;
            padding-top: 100px;
        }

        @keyframes bgAnimate {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* NAVBAR */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            transition: 0.3s;
        }
        .nav-link:hover {
            color: #ffcc80 !important;
            transform: scale(1.1);
        }

        /* Form Card */
        .upload-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 1.4s ease-in-out;
            max-width: 550px;
            margin: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #4e342e;
        }

        .btn-upload {
            background: #6d4c41;
            color: white;
            border-radius: 30px;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .btn-upload:hover {
            background: #4e342e;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" style="font-size: 26px;">📁 Upload Images</a>
        <div>
            <a href="/admin_dashboard/" class="nav-link d-inline-block mx-2">Dashboard</a>
            <a href="/admin_upload_csv/" class="nav-link d-inline-block mx-2">Upload CSV</a>
            <a href="/admin_upload_images/" class="nav-link d-inline-block mx-2">Upload Images</a>
            <a href="/admin_preprocess/" class="nav-link d-inline-block mx-2">Preprocess</a>
            <a href="/admin_train_ml/" class="nav-link d-inline-block mx-2">Train ML</a>
            <a href="/admin_train_cnn/" class="nav-link d-inline-block mx-2">Train CNN</a>
            <a href="/logout/" class="nav-link d-inline-block mx-2">Logout</a>
        </div>
    </div>
</nav>


<!-- UPLOAD FORM -->
<div class="upload-card mt-5">
    <h2 class="upload-title"><i class="bi bi-images"></i> Upload Image Dataset (ZIP)</h2>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label class="fw-bold mb-2">Select ZIP File:</label>
        <input type="file" class="form-control mb-3" name="zip_file" required>

        <button class="btn btn-upload w-100 mt-2">
            <i class="bi bi-cloud-upload"></i> Upload Dataset
        </button>
    </form>
</div>

</body>
</html>
